{% extends "base.html" %}

{% block title %}Lojas e Setores{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 text-secondary"><i class="fas fa-store me-2"></i>Lojas e Setores</h4>
    <!-- <button class="btn btn-primary"><i class="fas fa-plus me-1"></i> Nova Unidade</button> -->
</div>

<div class="row g-4">
    <!-- Lojas -->
    <div class="col-12">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0 text-muted">Todas as Lojas / Unidades</h6>
                <span class="badge bg-light text-dark">{{ stats|length }} Unidades</span>
            </div>
            <div class="list-group list-group-flush">
                {% for store in stats %}
                <a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <div>
                        <strong>{{ store.name }}</strong>
                        <!-- <div class="small text-muted">Endereço não cadastrado</div> -->
                    </div>
                    <span class="badge bg-{{ 'primary' if store.count > 0 else 'secondary' }} rounded-pill">{{ store.count }} chamados</span>
                </a>
                {% else %}
                <div class="list-group-item text-center text-muted py-3">
                    Nenhuma loja encontrada.
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
