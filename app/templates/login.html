{% extends "base.html" %}

{% block title %}Login - Central de Chamados{% endblock %}

{% block content %}
<style>
    .login-container {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f7f7f5 0%, #ececea 100%);
    }

    [data-bs-theme="dark"] .login-container {
        background: linear-gradient(180deg, #0f1113 0%, #17191b 100%);
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: 18px;
        border: 1px solid #e1e2dd;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(17, 17, 17, 0.08);
    }
    
    [data-bs-theme="dark"] .login-card {
        background-color: #151719;
        border-color: #2a2d31;
        box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .login-header {
        padding: 28px 28px 18px 28px;
        border-bottom: 1px solid #ecece7;
        text-align: left;
    }

    [data-bs-theme="dark"] .login-header {
        border-bottom-color: #2a2d31;
    }

    .login-mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #f2f2ee;
        color: #1f1f1f;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        margin-bottom: 16px;
        border: 1px solid #e3e3dd;
    }

    [data-bs-theme="dark"] .login-mark {
        background: #1f2124;
        color: #f4f4ef;
        border-color: #2a2d31;
    }

    .login-subtitle {
        color: #6c6f66;
    }

    [data-bs-theme="dark"] .login-subtitle {
        color: #a7a9a2;
    }

    .form-floating .form-control {
        border-radius: 12px;
        border: 1px solid #dadbd6;
        background-color: #f9f9f6;
        color: #1f1f1f;
        height: 54px;
    }
    
    [data-bs-theme="dark"] .form-control {
        background-color: #1c1f22;
        border-color: #2f3338;
        color: #f1f1ec;
    }
    
    [data-bs-theme="dark"] .form-floating label {
        color: #a7a9a2;
    }

    .form-floating .form-control:focus {
        border-color: #1f1f1f;
        box-shadow: 0 0 0 0.2rem rgba(31, 31, 31, 0.08);
    }

    [data-bs-theme="dark"] .form-floating .form-control:focus {
        border-color: #f1f1ec;
        box-shadow: 0 0 0 0.2rem rgba(241, 241, 236, 0.08);
    }

    .btn-login {
        padding: 12px 14px;
        font-weight: 600;
        border-radius: 12px;
        background: #1f1f1f;
        border: 1px solid #1f1f1f;
        color: #ffffff;
        transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .btn-login:hover {
        background: #2a2a2a;
        border-color: #2a2a2a;
        transform: translateY(-1px);
    }

    [data-bs-theme="dark"] .btn-login {
        background: #f1f1ec;
        border-color: #f1f1ec;
        color: #151515;
    }

    [data-bs-theme="dark"] .btn-login:hover {
        background: #e6e6df;
        border-color: #e6e6df;
    }

    .login-body {
        padding: 24px 28px 28px 28px;
    }

    .theme-toggle-login {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: #f7f7f3;
        border: 1px solid #dfdfd8;
        color: #1f1f1f;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        box-shadow: 0 6px 14px rgba(17, 17, 17, 0.08);
    }

    [data-bs-theme="dark"] .theme-toggle-login {
        background: #1c1f22;
        border-color: #2f3338;
        color: #f1f1ec;
        box-shadow: 0 6px 14px rgba(0,0,0,0.35);
    }

    .theme-toggle-login:hover {
        transform: translateY(-1px);
        background: #edede7;
        border-color: #d8d8d1;
    }

    [data-bs-theme="dark"] .theme-toggle-login:hover {
        background: #24282d;
        border-color: #353a40;
    }

    .topbar, .sidebar {
        display: none !important;
    }
    
    .main-content {
        margin-left: 0 !important;
        margin-top: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
    }
</style>

<div class="login-container">
    <button class="theme-toggle-login" id="loginThemeToggle" title="Alternar Tema">
        <i class="fas fa-moon"></i>
    </button>

    <div class="card login-card">
        <div class="login-header">
            <div class="login-mark">
                <i class="fas fa-headset"></i>
            </div>
            <h4 class="mb-1 fw-semibold">Bem-vindo</h4>
            <p class="mb-0 small login-subtitle">Sistema dos Primatas</p>
        </div>
        <div class="login-body bg-surface">
            <form method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Usuário" required autofocus>
                    <label for="username"><i class="fas fa-user me-2 text-muted"></i>Usuário</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                    <label for="password"><i class="fas fa-lock me-2 text-muted"></i>Senha</label>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i> Entrar
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Sistema dos Primatas &copy; {{ now.year if now else '2026' }}</small>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('loginThemeToggle');
        const icon = toggleBtn.querySelector('i');
        const html = document.documentElement;
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-bs-theme', savedTheme);
        updateIcon(savedTheme);
        
        toggleBtn.addEventListener('click', function() {
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });
        
        function updateIcon(theme) {
            if (theme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }
    });
</script>
{% endblock %}
