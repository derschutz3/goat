{% extends "base.html" %}

{% block title %}Login - Central de Chamados{% endblock %}

{% block content %}
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }

    [data-bs-theme="dark"] .login-container {
        background: linear-gradient(135deg, #1a1d20 0%, #2c3034 100%);
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        border: none;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        transform: translateY(0);
        transition: all 0.3s ease;
        animation: fadeInUp 0.6s ease-out;
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .login-header {
        background: linear-gradient(45deg, var(--primary-color), #4a90e2);
        color: white;
        padding: 30px 20px;
        text-align: center;
        border-bottom: none;
    }

    .login-icon {
        font-size: 3rem;
        margin-bottom: 10px;
        animation: pulse 2s infinite;
    }

    .form-floating .form-control {
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background-color: var(--surface-color);
        color: var(--text-color);
    }

    .form-floating .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }

    .btn-login {
        padding: 12px;
        font-weight: 600;
        border-radius: 8px;
        transition: all 0.3s ease;
        background: linear-gradient(to right, var(--primary-color), #4a90e2);
        border: none;
    }

    .btn-login:hover {
        background: linear-gradient(to right, #0b5ed7, #3a80d2);
        transform: scale(1.02);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    /* Hide standard navbar/sidebar for login page */
    .topbar, .sidebar {
        display: none !important;
    }
    
    /* Reset main content margin for login page */
    .main-content {
        margin-left: 0 !important;
        padding-top: 0 !important;
    }
</style>

<div class="login-container">
    <div class="card login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-headset"></i>
            </div>
            <h4 class="mb-0 fw-bold">Bem-vindo</h4>
            <p class="mb-0 opacity-75 small">Central de Chamados</p>
        </div>
        <div class="card-body p-4 p-md-5 bg-surface">
            <form method="POST">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Usuário" required autofocus>
                    <label for="username"><i class="fas fa-user me-2 text-muted"></i>Usuário</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                    <label for="password"><i class="fas fa-lock me-2 text-muted"></i>Senha</label>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-login text-white">
                        <i class="fas fa-sign-in-alt me-2"></i> Entrar
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">Sistema de Gestão de TI &copy; {{ now.year if now else '2026' }}</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
